<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>__TITLE__</title>
<style>
  :root{--ink:#16201c;--ink-soft:#4a5550;--bg:#f4f2ec;--panel:#fbfaf6;--line:#d8d3c6;--line-soft:#e7e3d8;
    --accent:#1f5c4a;--accent-soft:#d9e7e0;--signal:#c5562e;--signal-soft:#f3ddd2;--amber:#b88324;--amber-soft:#f0e4cb}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
  .layout{display:flex;max-width:1180px;margin:0 auto}
  .wrap{max-width:1000px;margin:0 auto;padding:0 24px 80px;width:100%}
  .toc{width:210px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;padding:30px 18px;border-right:1px solid var(--line)}
  .toc .tt{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:700;margin-bottom:14px}
  .toc a{display:block;font-size:13px;color:var(--ink-soft);text-decoration:none;padding:7px 10px;border-radius:6px}
  .toc a:hover{background:var(--accent-soft);color:var(--accent)}
  .toc a .ic{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;background:var(--ink);color:#fff;border-radius:4px;font-size:10px;font-weight:700;margin-right:8px}
  .main{flex:1;min-width:0;padding:30px 40px 80px}
  @media(max-width:820px){.toc{display:none}.main{padding:24px}}
  .rh{padding:34px 0 24px;border-bottom:2px solid var(--ink);margin-bottom:8px}
  .rh .eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
  .rh h1{font-size:28px;font-weight:700;letter-spacing:-.02em;margin:8px 0 11px}
  .rh .meta{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-soft)}
  .rh .meta b{color:var(--ink)}
  .summary-line{background:var(--accent-soft);border-left:3px solid var(--accent);padding:13px 16px;border-radius:0 8px 8px 0;font-size:13.5px;margin-top:16px}
  .verdict{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin:24px 0}
  .vc{padding:17px 15px;border-right:1px solid var(--line-soft);background:var(--panel)}
  .vc:last-child{border-right:none}
  .vc .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft)}
  .vc .v{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-top:5px}
  .vc .v.ok{color:var(--accent)}.vc .v.warn{color:var(--amber)}.vc .v.block{color:var(--signal)}
  .vc .sub{font-size:11px;color:var(--ink-soft);margin-top:2px}
  .sec{margin-top:46px}
  .sec-num{display:inline-block;font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:3px 11px;border-radius:20px;margin-bottom:12px}
  .sec h2{font-size:22px;font-weight:700;margin-bottom:6px}
  .sec .lead{font-size:14px;color:var(--ink-soft);margin-bottom:20px}
  h3{font-size:16px;font-weight:650;margin:28px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--line-soft)}
  h3.sub{font-size:13px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;border:none;margin:22px 0 10px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:18px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  .card .label{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}
  .card .big{font-size:25px;font-weight:700;letter-spacing:-.02em;margin:6px 0 2px}
  .card .note{font-size:12px;color:var(--ink-soft)}
  .card .trend{font-size:12px;font-weight:600;margin-top:4px}
  .trend.up{color:var(--accent)}.trend.down{color:var(--signal)}.trend.flat{color:var(--amber)}
  .chart-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:20px;margin:18px 0}
  .chart-box .ct{font-size:14px;font-weight:650;margin-bottom:4px}
  .chart-box .cs{font-size:12px;color:var(--ink-soft);margin-bottom:16px}
  .legend,.viz-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:11px;font-size:12px;color:var(--ink-soft)}
  .legend span,.viz-legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i,.viz-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line-soft)}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600;background:var(--panel)}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .insight{background:var(--accent-soft);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:16px 18px;margin:14px 0;font-size:13.5px}
  .insight b{color:var(--accent)}
  .reco{display:flex;gap:14px;padding:16px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:var(--panel)}
  .reco .n{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .reco .rb{font-size:13.5px}.reco .rb b{display:block;margin-bottom:3px;font-size:14px}
  .risk{display:flex;gap:12px;padding:12px 15px;border-radius:8px;margin-bottom:9px;font-size:13px;border:1px solid var(--line);background:var(--panel)}
  .risk .sev{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;height:fit-content;white-space:nowrap}
  .sev.hi{background:var(--signal-soft);color:var(--signal)}.sev.md{background:var(--amber-soft);color:var(--amber)}.sev.lo{background:var(--accent-soft);color:var(--accent)}
  .cat{margin-top:44px;scroll-margin-top:20px}
  .cat-head{display:flex;align-items:center;gap:12px;padding-bottom:10px;border-bottom:2px solid var(--accent);margin-bottom:8px}
  .cat-ic{width:30px;height:30px;background:var(--accent);color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
  .cat-head h2{font-size:21px;font-weight:700;flex:1}
  .cat-score{font-size:12.5px;color:var(--accent);font-weight:600;background:var(--accent-soft);padding:4px 12px;border-radius:20px}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:15px 17px;margin-bottom:11px}
  .item.has-action{border-left:3px solid var(--amber)}
  .item-h{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:6px}
  .item-name{font-size:15px;font-weight:650}
  .ks{font-size:10px;font-weight:700;background:var(--signal-soft);color:var(--signal);padding:2px 8px;border-radius:5px}
  .sim{font-size:11px;font-weight:600;background:var(--line-soft);color:var(--ink-soft);padding:2px 9px;border-radius:20px;margin-left:auto}
  .item-val{font-size:14px;margin-bottom:6px}.gap{color:var(--amber);font-style:italic}
  .item-rd{font-size:13px;color:var(--ink-soft);background:var(--bg);border-radius:6px;padding:9px 12px;margin:7px 0}
  .item-src{font-size:11.5px;color:var(--ink-soft);margin-top:7px}
  .tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
  .tag.t1{background:var(--accent-soft);color:var(--accent)}.tag.t2{background:var(--amber-soft);color:var(--amber)}
  .tag.t3{background:var(--line-soft);color:var(--ink-soft)}.tag.gap{background:var(--signal-soft);color:var(--signal)}
  .gapflag{color:var(--signal);font-weight:600}
  .actions{margin-top:11px;background:var(--amber-soft);border-radius:7px;padding:11px 14px}
  .actions-t{font-size:12px;font-weight:700;color:var(--amber);margin-bottom:6px}
  .actions ul{margin:0;padding-left:18px}.actions li{font-size:13px;margin-bottom:4px}
  .viz{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;margin:14px 0}
  .viz .vt{font-size:13px;font-weight:650;margin-bottom:3px}
  .viz .vs{font-size:11.5px;color:var(--ink-soft);margin-bottom:12px}
  .checklist{margin-top:44px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:24px}
  .checklist h2{font-size:20px;margin-bottom:6px}.checklist .cl-sub{font-size:13px;color:var(--ink-soft);margin-bottom:18px}
  .ck-item{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line-soft)}.ck-item:last-child{border:none}
  .ck-name{font-size:14px;font-weight:650;color:var(--accent);margin-bottom:5px}
  .ck-item ul{margin:0;padding-left:18px}.ck-item li{font-size:13px;margin-bottom:3px;color:var(--ink-soft)}
  .foot{margin-top:44px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-soft)}
</style>
</head>
<body>
<div class="__LAYOUTCLASS__">
  __TOC__
  <div class="main">
    <div class="rh">
      <div class="eyebrow">__SUBTITLE__</div>
      <h1>__TITLE__</h1>
      <div class="meta">
        <span>대상국 <b>__TARGET__ 🇵🇱</b></span>
        <span>비교 기준 <b>__BASE__ 🇬🇧</b></span>
        <span>조사 <b>2025년</b></span>
        <span>종합 유사도 <b>__TOTAL__</b> (__VERDICT__)</span>
      </div>
    </div>
    __BODY__
    <div class="foot">오토파이낸스 진출 진단 에이전트 자동 생성 · 룰셋 디폴트 v1 · 출처 등급: 공식 1차 / 준공식 / 참고. "공식 미확보"·"조사 필요" 항목은 진출 확정 전 현지 1차 실사로 보완하십시오.</div>
  </div>
</div>
<script>
__CHARTS_JS__
const VIZ=__VIZ__;
const C=ChartLib.C;
function lim(items,mode){
  items=items.slice().sort((a,b)=>b.sim-a.sim);
  if(mode==="extremes" && items.length>7){
    return [...items.slice(0,3),{name:"⋯ ("+(items.length-6)+"개 생략)",sim:null,_skip:true},...items.slice(-3)];
  }
  if(typeof mode==="number") return items.slice(0,mode);
  return items;
}
// 정의 기반 차트 (data-spec)
document.querySelectorAll(".rchart").forEach(svg=>{
  const s=JSON.parse(svg.dataset.spec.replace(/&quot;/g,'"'));
  if(s.chart==="bar"){
    const cats=VIZ.result.cats;
    ChartLib.bar(svg,[{label:"시장",v:cats.MARKET,w:"25%"},{label:"규제",v:cats.REGULATORY,w:"25%"},{label:"금융",v:cats.FINANCIAL,w:"20%"},{label:"시스템",v:cats.SYSTEM,w:"30%"}],{W:920,H:260,gate:s.gate});
    svg.setAttribute("viewBox","0 0 920 260");
  }else if(s.chart==="hbar"){
    ChartLib.hbar(svg,lim(VIZ.itemSims[s.category]||[],s.limit||10),{W:920});
  }else if(s.chart==="line"){
    svg.setAttribute("viewBox","0 0 920 240");
    const items=s.items, sc=s.scale||1;
    let years=Object.keys(VIZ.ts[items[0]].data);
    if(s.forecast && !years.includes("2030")) years=[...years,"2030"];
    const colors=[C.accent,C.soft];
    const series=[];
    items.forEach((k,idx)=>{const t=VIZ.ts[k];if(!t)return;
      const base=years.map(y=>y!=="2030"&&t.data[y]!=null?t.data[y]*sc:null);
      series.push({data:base,color:colors[idx],dash:"0"});
      if(s.forecast&&t.fc){const last=years.filter(y=>t.data[y]!=null).pop();series.push({data:years.map(y=>y===last?t.data[last]*sc:(y==="2030"?t.fc*sc:null)),color:colors[idx],dash:"5,4"});}
    });
    ChartLib.line(svg,series,{years,ymin:0});
    if(items.length>1)svg.insertAdjacentHTML("afterend",'<div class="legend"><span><i style="background:#1f5c4a"></i>폴란드</span><span><i style="background:#4a5550"></i>영국</span><span>점선=예측</span></div>');
  }else if(s.chart==="donut"){
    svg.setAttribute("viewBox","0 0 220 220");
    ChartLib.donut(svg,s.segs.map((x,i)=>({v:x.v,color:i===0?C.accent:C.amber})));
    svg.insertAdjacentHTML("afterend",'<div class="legend">'+s.segs.map((x,i)=>`<span><i style="background:${i===0?'#1f5c4a':'#b88324'}"></i>${x.label}</span>`).join("")+'</div>');
  }else if(s.chart==="group"){
    svg.setAttribute("viewBox","0 0 920 200");
    ChartLib.group(svg,s.groups,{W:920,H:200,suffix:s.suffix||""});
    svg.insertAdjacentHTML("afterend",'<div class="legend"><span><i style="background:#4a5550"></i>영국</span><span><i style="background:#1f5c4a"></i>폴란드</span></div>');
  }
});
// 카테고리 hbar
document.querySelectorAll(".hbar-chart").forEach(svg=>{
  ChartLib.hbar(svg,lim(VIZ.itemSims[svg.dataset.cat]||[],svg.dataset.limit==="all"?"all":"extremes"),{});
});
// 시계열 (항목 내)
document.querySelectorAll(".ts-chart").forEach(svg=>{
  const cid=svg.dataset.cid,pl=VIZ.ts["PL_"+cid],uk=VIZ.ts["UK_"+cid];if(!pl)return;
  svg.setAttribute("viewBox","0 0 900 240");
  let years=Object.keys(pl.data);if(pl.fc&&!years.includes("2030"))years=[...years,"2030"];
  function ser(t,color){if(!t)return[];const base=years.map(y=>y!=="2030"&&t.data[y]!=null?t.data[y]:null);const out=[{data:base,color,dash:"0"}];if(t.fc){const last=years.filter(y=>t.data[y]!=null).pop();out.push({data:years.map(y=>y===last?t.data[last]:(y==="2030"?t.fc:null)),color,dash:"5,4"});}return out;}
  ChartLib.line(svg,[...ser(pl,C.accent),...ser(uk,C.soft)],{years,ymin:0});
  svg.insertAdjacentHTML("afterend",'<div class="viz-legend"><span><i style="background:#1f5c4a"></i>폴란드</span><span><i style="background:#4a5550"></i>영국</span><span>점선=예측</span></div>');
});
</script>
</body>
</html>
