<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오토파이낸스 해외진출 진단 · Market Entry Diagnostic</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&family=Satoshi:wght@100..900&display=swap" rel="stylesheet" />

<!-- D3 + TopoJSON (플랫 세계지도) -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          primary: "#004ac6",
          "primary-container": "#2563eb",
          "primary-fixed": "#dbe1ff",
          "on-primary": "#ffffff",
          "on-primary-fixed": "#00174b",
          "on-primary-fixed-variant": "#003ea8",
          "on-primary-container": "#eeefff",
          secondary: "#575d78",
          tertiary: "#006242",
          "tertiary-container": "#007d55",
          "on-tertiary": "#ffffff",
          "on-tertiary-container": "#bdffdb",
          surface: "#f7f9fb",
          "surface-container-lowest": "#ffffff",
          "surface-container-low": "#f2f4f6",
          "surface-container": "#eceef0",
          "surface-container-high": "#e6e8ea",
          "surface-container-highest": "#e0e3e5",
          "on-surface": "#191c1e",
          "on-surface-variant": "#434655",
          outline: "#737686",
          "outline-variant": "#c3c6d7",
          error: "#ba1a1a",
        },
        spacing: {
          unit: "4px", xs: "4px", sm: "8px", md: "16px", lg: "24px",
          xl: "32px", xxl: "48px", gutter: "24px", "margin-desktop": "48px",
        },
        fontFamily: {
          "display-lg": ["Satoshi"], "label-caps": ["Satoshi"],
          "body-bold": ["Pretendard"], "headline-md": ["Pretendard"], "body-base": ["Pretendard"],
        },
        fontSize: {
          "display-lg": ["28px", { lineHeight: "34px", letterSpacing: "-0.02em", fontWeight: "800" }],
          "label-caps": ["11px", { lineHeight: "16px", letterSpacing: "0.15em", fontWeight: "700" }],
          "body-bold": ["16px", { lineHeight: "24px", fontWeight: "600" }],
          "headline-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "700" }],
          "body-base": ["16px", { lineHeight: "24px", fontWeight: "400" }],
          "stat-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
        },
      },
    },
  };
</script>
<link href="css/app.css" rel="stylesheet" />
</head>

<body class="bg-surface text-on-surface overflow-hidden">

<!-- ===== TopNavBar (공통: 상단바만, 사이드바 없음) ===== -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-desktop bg-surface/90 backdrop-blur-xl border-b border-outline-variant h-20 shadow-sm">
  <div class="flex items-center gap-xl">
    <span class="font-display-lg text-display-lg font-black text-primary leading-none cursor-pointer" onclick="App.go('main')">Market Entry Diagnostic</span>
    <nav class="hidden md:flex items-center gap-lg">
      <a class="nav-link text-primary font-body-bold border-b-2 border-primary pb-1 cursor-pointer" data-i18n="메인" onclick="App.go('main')">메인</a>

      <div class="relative group">
        <button class="text-on-surface-variant font-body-base hover:text-primary transition-colors flex items-center gap-1">
          <span data-i18n="상세 진단">상세 진단</span>
          <span class="material-symbols-outlined text-sm">keyboard_arrow_down</span>
        </button>
        <div class="absolute top-full left-0 mt-2 w-52 glass-panel rounded-xl shadow-lg border border-outline-variant opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 py-2 z-50">
          <a class="block px-4 py-2 hover:bg-primary/5 text-sm cursor-pointer" data-i18n="권역 상세" onclick="App.go('region')">권역 상세</a>
          <a class="block px-4 py-2 hover:bg-primary/5 text-sm cursor-pointer" data-i18n="국가 상세" onclick="App.go('country')">국가 상세</a>
          <a class="block px-4 py-2 hover:bg-primary/5 text-sm cursor-pointer" data-i18n="국가 전체 보기" onclick="App.go('countries')">국가 전체 보기</a>
        </div>
      </div>

      <div class="relative group">
        <button class="text-on-surface-variant font-body-base hover:text-primary transition-colors flex items-center gap-1">
          <span data-i18n="보고서">보고서</span>
          <span class="material-symbols-outlined text-sm">keyboard_arrow_down</span>
        </button>
        <div class="absolute top-full left-0 mt-2 w-52 glass-panel rounded-xl shadow-lg border border-outline-variant opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 py-2 z-50">
          <a class="block px-4 py-2 hover:bg-primary/5 text-sm cursor-pointer" data-i18n="권역 보고서" onclick="App.go('region-report')">권역 보고서</a>
          <a class="block px-4 py-2 hover:bg-primary/5 text-sm cursor-pointer" data-i18n="국가 보고서" onclick="App.go('country-report')">국가 보고서</a>
        </div>
      </div>

      <div class="relative group">
        <button class="text-on-surface-variant font-body-base hover:text-primary transition-colors flex items-center gap-1">
          <span data-i18n="환경 설정">환경 설정</span>
          <span class="material-symbols-outlined text-sm">keyboard_arrow_down</span>
        </button>
        <div class="absolute top-full left-0 mt-2 w-52 glass-panel rounded-xl shadow-lg border border-outline-variant opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 py-2 z-50">
          <a class="block px-4 py-2 hover:bg-primary/5 text-sm cursor-pointer" data-i18n="가중치 설정" onclick="App.go('settings')">가중치 설정</a>
        </div>
      </div>
    </nav>
  </div>

  <!-- 우측: 국기(언어 전환) -->
  <div class="flex items-center gap-md">
    <div class="flex items-center gap-1 bg-surface-container-low rounded-full p-1 border border-outline-variant">
      <button id="lang-ko" class="lang-btn w-8 h-8 rounded-full flex items-center justify-center text-lg transition-all" title="한국어" onclick="I18n.setLang('ko')">🇰🇷</button>
      <button id="lang-en" class="lang-btn w-8 h-8 rounded-full flex items-center justify-center text-lg transition-all opacity-50" title="English" onclick="I18n.setLang('en')">🇬🇧</button>
    </div>
    <button class="p-2 hover:bg-primary/5 rounded-full transition-colors">
      <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
    </button>
    <button class="p-2 hover:bg-primary/5 rounded-full transition-colors">
      <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
    </button>
  </div>
</header>

<!-- ===== 화면 컨테이너 ===== -->
<div id="screens">

  <!-- ===== M1: 메인 (세계지도) ===== -->
  <section id="screen-main" class="screen active">
    <main class="pt-20 h-screen flex flex-col relative">
      <section class="flex-1 map-container relative">
        <!-- 지도가 그려지는 곳 -->
        <div id="map-root" class="absolute inset-0 z-0"></div>

        <!-- 권역 선택 (좌상단) -->
        <div class="absolute top-lg left-margin-desktop z-10 w-72">
          <div class="glass-panel p-md rounded-xl double-bezel">
            <label class="block text-label-caps text-secondary mb-2" data-i18n="권역 선택">권역 선택</label>
            <div class="relative">
              <button class="w-full h-[52px] flex items-center justify-between px-md bg-white border border-outline-variant rounded-full text-on-surface font-medium hover:border-primary transition-all" onclick="App.toggleRegionDropdown()">
                <span id="selected-region" data-i18n="전체 보기">전체 보기</span>
                <span class="material-symbols-outlined">expand_more</span>
              </button>
              <div id="region-dropdown" class="absolute top-[60px] left-0 w-full glass-panel rounded-xl shadow-xl border border-outline-variant hidden z-20">
                <ul class="py-2" id="region-list"></ul>
              </div>
            </div>
          </div>
        </div>

        <!-- 범례 (우상단, 작게) -->
        <div class="absolute top-lg right-margin-desktop z-10">
          <div class="glass-panel px-lg py-md rounded-xl double-bezel flex gap-lg">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-primary pulse-entered"></div>
              <span class="text-sm font-medium text-secondary" data-i18n="진출 완료">진출 완료</span>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-tertiary pulse-planned"></div>
              <span class="text-sm font-medium text-secondary" data-i18n="진출 예정">진출 예정</span>
            </div>
          </div>
        </div>

        <!-- 권역 닫기 버튼 (권역 확대 시만 노출) -->
        <button id="region-close" class="absolute top-[120px] right-margin-desktop z-10 hidden w-10 h-10 glass-panel rounded-full items-center justify-center double-bezel hover:bg-white transition-colors" onclick="App.closeRegion()" title="닫기">
          <span class="material-symbols-outlined text-secondary">close</span>
        </button>

        <!-- 요약 스탯 (좌하단) -->
        <div class="absolute bottom-lg left-margin-desktop z-10 grid grid-cols-2 gap-md w-[460px]">
          <div class="glass-panel p-md rounded-xl double-bezel bg-white/40">
            <p class="text-label-caps text-secondary" data-i18n="진출 완료 국가">진출 완료 국가</p>
            <div class="flex items-end gap-2 mt-1">
              <span id="stat-entered" class="font-satoshi text-3xl font-black text-primary">0</span>
              <span class="text-xs text-secondary mb-1" data-i18n="개">개</span>
            </div>
          </div>
          <div class="glass-panel p-md rounded-xl double-bezel bg-white/40">
            <p class="text-label-caps text-secondary" data-i18n="진출 예정 국가">진출 예정 국가</p>
            <div class="flex items-end gap-2 mt-1">
              <span id="stat-planned" class="font-satoshi text-3xl font-black text-tertiary">0</span>
              <span class="text-xs text-secondary mb-1" data-i18n="개">개</span>
            </div>
          </div>
        </div>

        <!-- 분석 프로그레스 카드 패널 (우상단, 노출/비노출) -->
        <div id="progress-panel" class="absolute top-[120px] right-margin-desktop z-10 w-80 hidden">
          <div class="glass-panel rounded-xl double-bezel">
            <div class="double-bezel-inner rounded-[11px] p-md">
              <div class="flex justify-between items-start mb-2">
                <div>
                  <p class="text-label-caps text-secondary" id="pp-scope">COUNTRY</p>
                  <h3 class="font-body-bold text-on-surface" id="pp-name">—</h3>
                </div>
                <div class="w-2 h-2 rounded-full bg-tertiary glow-pulse mt-2"></div>
              </div>
              <p class="text-xs text-on-surface-variant mb-2" data-i18n="분석 진행 중">분석 진행 중</p>
              <div class="flex justify-between text-label-caps text-outline mb-1">
                <span id="pp-pct">0%</span>
              </div>
              <div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
                <div id="pp-bar" class="h-full bg-primary shimmer transition-all duration-500" style="width:0%"></div>
              </div>
              <div class="flex gap-2 mt-md">
                <button class="flex-1 text-sm py-2 rounded-full bg-surface-container text-on-surface hover:bg-surface-container-high transition-colors" data-i18n="상세보기" onclick="App.openProgressModal()">상세보기</button>
                <button id="pp-report" class="flex-1 text-sm py-2 rounded-full bg-outline-variant text-white opacity-50 cursor-not-allowed transition-all" data-i18n="보고서" disabled onclick="App.openReportFromPanel()">보고서</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- FAB: 진단 보고서 생성 (P4 룰셋 팝업 → P3) -->
      <button class="fixed bottom-xxl right-margin-desktop z-40 flex items-center gap-2 bg-primary text-white px-6 py-4 rounded-full shadow-[0_8px_30px_rgb(0,74,198,0.4)] hover:scale-105 active:scale-95 transition-all" onclick="App.openRulesetPopup()">
        <span class="font-body-bold" data-i18n="진단 보고서 생성">진단 보고서 생성</span>
        <div class="w-6 h-6 bg-white/20 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-[18px]">add_chart</span></div>
      </button>
    </main>
  </section>

  <!-- 다른 화면(M2~M7)은 후속 단계에서 채움 -->
  <section id="screen-region" class="screen"></section>
  <section id="screen-country" class="screen"></section>
  <section id="screen-countries" class="screen"></section>
  <section id="screen-region-report" class="screen"></section>
  <section id="screen-country-report" class="screen"></section>
  <section id="screen-settings" class="screen"></section>
</div>

<!-- ===== 팝업/모달 마운트 지점 ===== -->
<div id="popup-root"></div>
<div id="modal-root"></div>

<!-- 엔진 (semantic → similarity 순서 중요) -->
<script src="../engine/semantic_matrix.js"></script>
<script src="../engine/similarity.js"></script>

<!-- 앱 모듈 -->
<script src="js/i18n.js"></script>
<script src="js/geo.js"></script>
<script src="js/store.js"></script>
<script src="js/map.js"></script>
<script src="js/popups.js"></script>
<script src="js/screens.js"></script>
<script>window.APP_TODAY = "2026-06-18";</script>
<script src="js/app.js"></script>
</body>
</html>
